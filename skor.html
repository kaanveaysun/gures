<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE WRESTLING HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --red-glow: #ff0055;
            --blue-glow: #00f0ff;
            --bg-dark: #050508;
            --yellow: #ffd500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            font-family: 'Teko', sans-serif;
            color: #fff;
            user-select: none;
        }

        .arena {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(90deg, rgba(255,0,85,0.08) 0%, rgba(5,5,8,1) 40%, rgba(5,5,8,1) 60%, rgba(0,240,255,0.08) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px);
            z-index: -1;
            transition: box-shadow 0.5s ease;
        }

        .arena::after {
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-50%);
        }

        /* TOP HUD */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 40px;
            position: relative;
            z-index: 10;
        }

        .fighter-plate {
            display: flex;
            flex-direction: column;
            width: 40%;
        }

        .fighter-plate.p1 { align-items: flex-start; }
        .fighter-plate.p2 { align-items: flex-end; }

        .fighter-name-wrap {
            background: rgba(0,0,0,0.7);
            border: 2px solid;
            padding: 10px 40px;
            transform: skewX(-15deg);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .p1 .fighter-name-wrap { border-color: var(--red-glow); box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        .p2 .fighter-name-wrap { border-color: var(--blue-glow); box-shadow: 0 0 15px rgba(0,240,255,0.4); }

        .fighter-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            transform: skewX(15deg);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .p1 .fighter-name { color: var(--red-glow); text-shadow: 0 0 10px var(--red-glow); }
        .p2 .fighter-name { color: var(--blue-glow); text-shadow: 0 0 10px var(--blue-glow); }

        .bars-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            transform: skewX(-15deg);
        }

        .p2 .bars-container { flex-direction: row-reverse; }

        .power-bar {
            width: 35px;
            height: 15px;
            background: #222;
            border: 1px solid #444;
            transition: all 0.3s;
        }

        .p1 .power-bar.filled { background: var(--red-glow); border-color: #fff; box-shadow: 0 0 15px var(--red-glow); }
        .p2 .power-bar.filled { background: var(--blue-glow); border-color: #fff; box-shadow: 0 0 15px var(--blue-glow); }

        .vs-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: absolute;
            left: 50%; top: 20px;
            transform: translateX(-50%);
            filter: drop-shadow(0 5px 15px rgba(0,0,0,1));
        }

        /* CENTER LARGE SCORES */
        .score-display-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 25vw;
            pointer-events: none;
            width: 100%;
            justify-content: center;
        }

        .huge-score {
            font-size: 45vh;
            line-height: 0.8;
            font-weight: 700;
            opacity: 0.15;
            text-shadow: 0 0 50px rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .p1 .huge-score { color: var(--red-glow); }
        .p2 .huge-score { color: var(--blue-glow); }
        
        .huge-score.pop {
            opacity: 0.9;
            transform: scale(1.1);
            text-shadow: 0 0 100px currentColor;
        }

        /* BOTTOM DRUM PAD BUTTONS */
        .action-dock {
            position: absolute;
            bottom: 40px; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            z-index: 20;
        }

        .drum-btn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            outline: none;
            width: 140px; height: 140px;
            border-radius: 50%;
            -webkit-tap-highlight-color: transparent;
        }

        .drum-btn:disabled { cursor: not-allowed; opacity: 0.4; filter: grayscale(1); }

        .drum-base {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            box-shadow: inset 0 -5px 15px rgba(0,0,0,0.8);
        }

        .p1-add .drum-base { background: #66001a; }
        .p2-add .drum-base { background: #004d4f; }

        .drum-top {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; font-weight: 900;
            text-transform: uppercase;
            box-shadow: inset 0 8px 10px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.5);
            transform: translateY(-15px);
            transition: transform 0.1s cubic-bezier(0, 0, 0.2, 1);
        }

        .p1-add .drum-top { background: var(--red-glow); color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .p2-add .drum-top { background: var(--blue-glow); color: #000; text-shadow: 0 2px 5px rgba(255,255,255,0.5); }

        .drum-btn:active:not(:disabled) .drum-top { transform: translateY(-2px); box-shadow: inset 0 4px 5px rgba(255,255,255,0.1), 0 2px 5px rgba(0,0,0,0.5); }

        .sys-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            width: 60px; height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .icon-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .icon-btn:active { transform: scale(0.95); }
        .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        @media (max-width: 768px) {
            .hud-header { padding: 10px; }
            .fighter-name-wrap { padding: 5px 15px; }
            .fighter-name { font-size: 1.4rem; }
            .power-bar { width: 20px; height: 10px; }
            .vs-badge { font-size: 2rem; top: 15px; }
            .huge-score { font-size: 30vh; }
            .score-display-center { gap: 15vw; }
            .drum-btn { width: 100px; height: 100px; }
            .drum-top { font-size: 1rem; transform: translateY(-10px); }
            .icon-btn { width: 50px; height: 50px; font-size: 1.2rem; }
            .action-dock { bottom: 20px; padding: 0 10px; }
        }

        /* MODAL */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s;
        }
        .modal.show { opacity: 1; pointer-events: auto; }
        
        .modal-winner {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 40px;
            transform: scale(0.5);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.1;
        }
        .modal.show .modal-winner { transform: scale(1); text-shadow: 0 0 30px currentColor; }

        .modal-btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .modal-btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        .modal-btn.secondary { font-size: 1.2rem; border-color: #555; color: #ccc; }
        .modal-btn.secondary:hover { border-color: #fff; color: #fff; background: transparent; }

        /* LEADING GLOW EFFECTS */
        body.lead-p1 .arena {
            box-shadow: inset 80px 0 200px -20px rgba(255,0,85,0.25);
            animation: p1Pulse 1.5s infinite alternate;
        }

        body.lead-p2 .arena {
            box-shadow: inset -80px 0 200px -20px rgba(0,240,255,0.25);
            animation: p2Pulse 1.5s infinite alternate;
        }

        @keyframes p1Pulse {
            0% { box-shadow: inset 50px 0 150px -20px rgba(255,0,85,0.15); }
            100% { box-shadow: inset 150px 0 250px -20px rgba(255,0,85,0.45); }
        }

        @keyframes p2Pulse {
            0% { box-shadow: inset -50px 0 150px -20px rgba(0,240,255,0.15); }
            100% { box-shadow: inset -150px 0 250px -20px rgba(0,240,255,0.45); }
        }

        body.lead-p1 .p1 .fighter-name-wrap { 
            box-shadow: 0 0 50px rgba(255,0,85,0.9), inset 0 0 20px rgba(255,0,85,0.6); 
            border-color: #fff; 
            transform: skewX(-15deg) scale(1.08);
        }
        body.lead-p2 .p2 .fighter-name-wrap { 
            box-shadow: 0 0 50px rgba(0,240,255,0.9), inset 0 0 20px rgba(0,240,255,0.6); 
            border-color: #fff; 
            transform: skewX(-15deg) scale(1.08);
        }
        
        body.lead-p1 .p1 .fighter-name { color: #fff; text-shadow: 0 0 25px rgba(255,0,85,1), 0 0 45px rgba(255,0,85,1); }
        body.lead-p2 .p2 .fighter-name { color: #fff; text-shadow: 0 0 25px rgba(0,240,255,1), 0 0 45px rgba(0,240,255,1); }

        body.lead-p1 #score1bg { opacity: 0.4; text-shadow: 0 0 120px var(--red-glow); transform: scale(1.15); }
        body.lead-p2 #score2bg { opacity: 0.4; text-shadow: 0 0 120px var(--blue-glow); transform: scale(1.15); }
    </style>
</head>
<body>

    <div class="arena"></div>

    <div class="hud-header">
        <div class="fighter-plate p1">
            <div class="fighter-name-wrap">
                <div class="fighter-name" id="name1">Fighter 1</div>
            </div>
            <div class="bars-container" id="bars1">
                <div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div>
            </div>
        </div>
        
        <div class="vs-badge">VS</div>

        <div class="fighter-plate p2">
            <div class="fighter-name-wrap">
                <div class="fighter-name" id="name2">Fighter 2</div>
            </div>
            <div class="bars-container" id="bars2">
                <div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div><div class="power-bar"></div>
            </div>
        </div>
    </div>

    <div class="score-display-center">
        <div class="huge-score p1" id="score1bg">0</div>
        <div class="huge-score p2" id="score2bg">0</div>
    </div>

    <div class="action-dock">
        <button class="drum-btn p1-add" id="add1" onclick="addScore(1)">
            <div class="drum-base"></div>
            <div class="drum-top">PUAN<br>AL</div>
        </button>
        
        <div class="sys-controls">
            <button class="icon-btn" id="undoBtn" onclick="undoLast()" title="Geri Al"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="icon-btn" onclick="resetMatch()" title="Sıfırla"><i class="fa-solid fa-power-off"></i></button>
            <button class="icon-btn" onclick="window.location.href='index.html'" title="Çıkış" style="font-size:1.2rem;"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
        </div>

        <button class="drum-btn p2-add" id="add2" onclick="addScore(2)">
            <div class="drum-base"></div>
            <div class="drum-top">PUAN<br>AL</div>
        </button>
    </div>

    <div class="modal" id="winnerModal">
        <div class="modal-winner" id="winnerText">ŞAMPİYON</div>
        <button class="modal-btn" onclick="resetMatch()"><i class="fa-solid fa-rotate"></i> YENİDEN KAPIŞ</button>
        <button class="modal-btn secondary" onclick="undoWin()"><i class="fa-solid fa-xmark"></i> GERİ AL</button>
    </div>

    <script>
        const fighter1 = localStorage.getItem('fighter1') || 'KIRMIZI';
        const fighter2 = localStorage.getItem('fighter2') || 'MAVİ';
        
        document.getElementById('name1').textContent = fighter1;
        document.getElementById('name2').textContent = fighter2;

        let p1Score = 0; let p2Score = 0;
        let gameOver = false;
        let historyStates = [];

        function updateUI() {
            const s1El = document.getElementById('score1bg');
            const s2El = document.getElementById('score2bg');
            
            s1El.textContent = p1Score;
            s2El.textContent = p2Score;
            
            const bars1 = document.getElementById('bars1').children;
            for(let i=0; i<6; i++) {
                if(i < p1Score) bars1[i].classList.add('filled');
                else bars1[i].classList.remove('filled');
            }
            
            const bars2 = document.getElementById('bars2').children;
            for(let i=0; i<6; i++) {
                if(i < p2Score) bars2[i].classList.add('filled');
                else bars2[i].classList.remove('filled');
            }
            
            if (p1Score > p2Score) {
                document.body.classList.add('lead-p1');
                document.body.classList.remove('lead-p2');
            } else if (p2Score > p1Score) {
                document.body.classList.add('lead-p2');
                document.body.classList.remove('lead-p1');
            } else {
                document.body.classList.remove('lead-p1', 'lead-p2');
            }
            
            document.getElementById('add1').disabled = gameOver || p1Score >= 6;
            document.getElementById('add2').disabled = gameOver || p2Score >= 6;
            document.getElementById('undoBtn').disabled = (historyStates.length === 0 || gameOver);
        }

        function triggerPop(player) {
            const el = document.getElementById(player === 1 ? 'score1bg' : 'score2bg');
            el.classList.add('pop');
            setTimeout(() => el.classList.remove('pop'), 300);
        }

        function checkWinCondition(prev1, prev2, curr1, curr2) {
            if (prev1 === 2 && prev2 === 2) {
                if (curr1 === 3 && curr2 === 2) return 1;
                if (curr2 === 3 && curr1 === 2) return 2;
            }
            if (curr1 === 5 && curr2 === 0) return 1;
            if (curr2 === 5 && curr1 === 0) return 2;
            if (prev1 === 5 && prev2 === 5) {
                if (curr1 === 6) return 1;
                if (curr2 === 6) return 2;
            }
            if (curr1 >= 6) return 1;
            if (curr2 >= 6) return 2;
            return 0;
        }

        function triggerWin(winnerIndex) {
            gameOver = true;
            const winnerName = winnerIndex === 1 ? fighter1 : fighter2;
            const color = winnerIndex === 1 ? 'var(--red-glow)' : 'var(--blue-glow)';
            
            const text = document.getElementById('winnerText');
            text.innerHTML = `<span style="color: ${color}">${winnerName}</span><br>KAZANDI`;
            text.style.color = color;
            
            document.getElementById('winnerModal').classList.add('show');
            fireConfetti(winnerIndex);
            updateUI();
        }

        function addScore(player) {
            if (gameOver) return;
            historyStates.push({ p1: p1Score, p2: p2Score });

            let prevP1 = p1Score; let prevP2 = p2Score;
            if (player === 1 && p1Score < 6) p1Score++;
            else if (player === 2 && p2Score < 6) p2Score++;

            triggerPop(player);

            let winner = checkWinCondition(prevP1, prevP2, p1Score, p2Score);
            if (winner > 0) setTimeout(() => triggerWin(winner), 400); // delay win for pop effect
            
            updateUI();
        }

        function undoLast() {
            if (historyStates.length === 0 || gameOver) return;
            const state = historyStates.pop();
            p1Score = state.p1; p2Score = state.p2;
            updateUI();
        }

        function undoWin() {
            document.getElementById('winnerModal').classList.remove('show');
            gameOver = false;
            if (historyStates.length > 0) {
                const state = historyStates.pop();
                p1Score = state.p1; p2Score = state.p2;
            }
            updateUI();
        }

        function resetMatch() {
            p1Score = 0; p2Score = 0;
            gameOver = false; historyStates = [];
            document.getElementById('winnerModal').classList.remove('show');
            updateUI();
        }

        function fireConfetti(winnerIndex) {
            const colors = winnerIndex === 1 ? ['#ff0055', '#ffffff'] : ['#00f0ff', '#ffffff'];
            var duration = 4 * 1000;
            var end = Date.now() + duration;
            (function frame() {
              confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
              confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        updateUI();
    </script>
</body>
</html>

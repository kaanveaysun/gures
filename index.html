<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE WRESTLING - GİRİŞ</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --red-glow: #ff0055;
            --blue-glow: #00f0ff;
            --bg-dark: #050508;
            --accent: #ffd500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Teko', sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Diagonal Split Background */
        .split-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            display: flex;
        }
        .bg-half { flex: 1; height: 100%; position: relative; }
        .bg-red { 
            background: linear-gradient(135deg, rgba(255,0,85,0.15) 0%, transparent 80%);
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
        }
        .bg-blue { 
            background: linear-gradient(-45deg, rgba(0,240,255,0.15) 0%, transparent 80%);
            margin-left: -20%;
        }

        .login-box {
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid #222;
            padding: 50px;
            width: 90%; max-width: 500px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: skewX(-5deg);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--red-glow), var(--blue-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
            transform: skewX(5deg);
        }

        .input-group label {
            display: block; font-size: 1.5rem; letter-spacing: 2px;
            margin-bottom: 5px; color: #aaa;
        }

        .p1-label { color: var(--red-glow) !important; text-shadow: 0 0 10px rgba(255,0,85,0.5); }
        .p2-label { color: var(--blue-glow) !important; text-shadow: 0 0 10px rgba(0,240,255,0.5); }

        .input-group input {
            width: 100%; padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #333;
            color: #fff; font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; font-weight: 700;
            outline: none; transition: all 0.3s;
        }

        .input-group input:focus { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        .start-btn {
            width: 100%; padding: 20px; margin-top: 20px;
            background: #fff; color: #000;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.2s;
            transform: skewX(5deg);
        }

        .start-btn:hover { background: var(--accent); box-shadow: 0 0 30px var(--accent); }
        .start-btn:active { transform: skewX(5deg) scale(0.95); }

    </style>
</head>
<body>
    <div class="split-bg">
        <div class="bg-half bg-red"></div>
        <div class="bg-half bg-blue"></div>
    </div>
    
    <div class="login-box">
        <div class="title">KAPIŞMA</div>
        <form id="namesForm">
            <div class="input-group">
                <label class="p1-label">KIRMIZI KÖŞE</label>
                <input type="text" id="p1Name" placeholder="1. SAVAŞÇI" required>
            </div>
            
            <div class="input-group">
                <label class="p2-label">MAVİ KÖŞE</label>
                <input type="text" id="p2Name" placeholder="2. SAVAŞÇI" required>
            </div>

            <button type="submit" class="start-btn">OYUNA GİRİŞ</button>
        </form>
    </div>

    <script>
        document.getElementById('namesForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const p1 = document.getElementById('p1Name').value.trim();
            const p2 = document.getElementById('p2Name').value.trim();
            if(p1 && p2) {
                localStorage.setItem('fighter1', p1);
                localStorage.setItem('fighter2', p2);
                window.location.href = 'skor.html';
            }
        });
        const oldP1 = localStorage.getItem('fighter1');
        const oldP2 = localStorage.getItem('fighter2');
        if(oldP1) document.getElementById('p1Name').value = oldP1;
        if(oldP2) document.getElementById('p2Name').value = oldP2;
    </script>
</body>
</html>
